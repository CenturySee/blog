<!-- 使用cdn加载文件 -->
<script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
<script>
// 自定义mermaid配置
const config = {
    startOnLoad: true,
    // 1. 将主题改为 dark 以匹配 PaperMod 的深色代码块
    theme: 'dark', 
    themeVariables: {
        // 2. 线条颜色：使用更亮但不过于刺眼的浅灰色
        lineColor: "#BBBBBB",
        // 3. 节点边框颜色
        nodeBorder: "#777777",
        // 4. 节点背景色：深灰色，与纯黑背景形成层次感
        mainBkg: "#2d2d2d",
        // 5. 字体颜色：确保文字清晰可见
        primaryTextColor: "#e0e0e0",
        // 6. 箭头颜色
        tertiaryColor: "#BBBBBB"
    },
    flowchart: {
        useMaxWidth: false,
        htmlLabels: true,
        curve: 'basis' // 可选：让线条看起来更圆滑
    }
};

mermaid.initialize(config);

window.onload = () => {
    // 确保在深色背景下初始化
    window.mermaid.init(undefined, document.querySelectorAll('.language-mermaid'));
}
</script>

<!-- 引入自定义字体CSS -->
{{ if hugo.IsProduction }}
  {{ $customFont := resources.Get "css/custom-font.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $customFont.RelPermalink }}" integrity="{{ $customFont.Data.Integrity }}">
{{ else }}
  {{ $customFont := resources.Get "css/custom-font.css" }}
  <link rel="stylesheet" href="{{ $customFont.RelPermalink }}">
{{ end }}
